name: release

# Auto-tagging via release-please (Conventional Commits).
# Push `feat:` / `fix:` commits to main -> release-please opens/updates a "release PR"
# that bumps package.json + CHANGELOG. Merge it -> a git tag + GitHub release are
# created automatically, which triggers the build + asset upload below.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple Silicon
            platform: darwin
            arch: arm64
            cross: false
          - os: macos-14         # Intel — built under Rosetta on the arm64 runner
            platform: darwin
            arch: x64
            cross: true
          - os: ubuntu-latest    # Linux x64
            platform: linux
            arch: x64
            cross: false
          - os: ubuntu-24.04-arm # Linux arm64
            platform: linux
            arch: arm64
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: Install x64 Bun for Rosetta cross-compile
        if: ${{ matrix.cross == true }}
        run: |
          curl -fsSL https://bun.sh/install | BUN_INSTALL="$HOME/.bun-x64" arch -x86_64 bash
          rm -rf node_modules bun.lockb
          "$HOME/.bun-x64/bin/bun" install
          echo "$HOME/.bun-x64/bin" >> $GITHUB_PATH
      - name: Build binary
        run: |
          if [[ "$CROSS" == "true" ]]; then
            arch -x86_64 ./scripts/build-release.sh "$VERSION"
          else
            ./scripts/build-release.sh "$VERSION"
          fi
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          CROSS: ${{ matrix.cross }}
      - uses: actions/upload-artifact@v4
        with:
          name: otodo-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/otodo-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            dist/otodo-${{ matrix.platform }}-${{ matrix.arch }}.sha256

  publish:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate formula
        run: |
          ./scripts/gen-formula.sh \
            "$VERSION" \
            "$GH_OWNER" \
            "$(cat dist/otodo-darwin-arm64.sha256)" \
            "$(cat dist/otodo-darwin-x64.sha256)"
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          GH_OWNER: ${{ github.repository_owner }}
      - name: Generate flake
        run: |
          ./scripts/gen-flake.sh \
            "$VERSION" \
            "$GH_OWNER" \
            "$(cat dist/otodo-darwin-arm64.sha256)" \
            "$(cat dist/otodo-darwin-x64.sha256)" \
            "$(cat dist/otodo-linux-arm64.sha256)" \
            "$(cat dist/otodo-linux-x64.sha256)"
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          GH_OWNER: ${{ github.repository_owner }}
      - name: Upload assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" \
            dist/otodo-darwin-arm64.tar.gz \
            dist/otodo-darwin-arm64.sha256 \
            dist/otodo-darwin-x64.tar.gz \
            dist/otodo-darwin-x64.sha256 \
            dist/otodo-linux-arm64.tar.gz \
            dist/otodo-linux-arm64.sha256 \
            dist/otodo-linux-x64.tar.gz \
            dist/otodo-linux-x64.sha256 \
            dist/otodo.rb \
            dist/flake.nix \
            --clobber
      - name: Commit updated flake.nix to main
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp dist/flake.nix flake.nix
          git add flake.nix
          git commit -m "chore: update flake.nix to v${VERSION} [skip ci]" || echo "no changes"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" HEAD:main
      - name: Update Homebrew tap
        if: ${{ env.GITHUB_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_OWNER}/homebrew-otodo.git" tap
          mkdir -p tap/Formula
          cp dist/otodo.rb tap/Formula/otodo.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/otodo.rb
          git commit -m "otodo v${VERSION}" || echo "no changes"
          git push
