name: release

# Auto-tagging via release-please (Conventional Commits).
# Push `feat:` / `fix:` commits to main -> release-please opens/updates a "release PR"
# that bumps package.json + CHANGELOG. Merge it -> a git tag + GitHub release are
# created automatically, which triggers the build + asset upload below.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - os: macos-14 # Apple Silicon (arm64)
            arch: arm64
          - os: macos-13 # Intel (x64)
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - name: Build ${{ matrix.arch }} binary
        run: ./scripts/build-release.sh "$VERSION"
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: otodo-darwin-${{ matrix.arch }}
          path: |
            dist/otodo-darwin-${{ matrix.arch }}.tar.gz
            dist/otodo-darwin-${{ matrix.arch }}.sha256

  publish:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate formula
        run: |
          ./scripts/gen-formula.sh \
            "$VERSION" \
            "${{ github.repository_owner }}" \
            "$(cat dist/otodo-darwin-arm64.sha256)" \
            "$(cat dist/otodo-darwin-x64.sha256)"
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
      - name: Upload assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" \
            dist/otodo-darwin-arm64.tar.gz \
            dist/otodo-darwin-x64.tar.gz \
            dist/otodo.rb \
            --clobber
      - name: Update Homebrew tap
        if: ${{ env.GITHUB_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository_owner }}/homebrew-otodo.git" tap
          mkdir -p tap/Formula
          cp dist/otodo.rb tap/Formula/otodo.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/otodo.rb
          git commit -m "otodo v${VERSION}" || echo "no changes"
          git push
